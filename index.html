<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Le Magazynier</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Caveat&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      background-color: #1c1c1c;
      font-family: sans-serif;
      color: #f5f5f5;
    }

    .form-wrapper {
      max-width: 500px;
      margin: auto;
      background: #333333;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 90vh;
    }

    .logo {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .logo-left {
      font-family: 'Informal Roman', cursive;
      color: #f9f9f9;
      line-height: 0.9;
      margin-left: 30px;
    }

    .logo-left .main {
      font-size: 3rem;
    }

    .logo-left .sub {
      font-size: 2rem;
      transform: translateY(-11px) translateX(26px);
      opacity: 0.8;
    }

    input {
      margin: 6px 0 20px;
      padding: 10px;
      width: 100%;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    input.uppercase {
      text-transform: uppercase;
    }

    .hidden {
      display: none;
    }

    button {
      padding: 12px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background-color: #666;
      color: white;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #888;
    }

    .main-menu {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 20px;
    }

    .main-menu button {
      width: 100%;
      height: 52px;
      font-size: 1.1rem;
      font-weight: bold;
    }

    .form-buttons {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    .form-buttons button {
      flex: 1;
      height: 48px;
      font-weight: bold;
    }

    .ok-btn {
      background-color: #2e7d32;
    }

    .ok-btn:hover {
      background-color: #3fa344;
    }

    .back-btn {
      background-color: #555;
    }

.logout-btn {
  background-color: #aa3333;
  width: 100%;
  height: 42px;
  font-size: 0.95rem;
  font-weight: bold;
  margin-top: auto;
}

    .logout-btn:hover {
      background-color: #cc4444;
    }

    .footer-logo {
      margin-top: 20px;
      text-align: center;
    }

    .footer-logo img {
      width: 45%;
      max-width: 200px;
      height: auto;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="form-wrapper" autocomplete="off">
    <div>

      <div class="logo">
        <div class="logo-left">
          <div class="main">Le Magazynier</div>
          <div class="sub">Belleville</div>
        </div>
      </div>

      <!-- LOGOWANIE -->
      <div id="login-section">
        <input type="password" id="kod" placeholder="Kod pracownika" required autocomplete="off">
        <button id="loginBtn" onclick="checkLogin()" style="width:100%;">Zaloguj</button>
      </div>

      <!-- MENU PO ZALOGOWANIU -->
      <div id="form-section" class="hidden">
        <p>Witaj, <strong id="user-name"></strong>!</p>

        <div id="main-menu" class="main-menu">
          <button onclick="showRouteForm('pz.html')">Przyjęcie moduły</button>
          <button onclick="showRouteForm('wz.html')">Wydanie moduły</button>
          <button onclick="window.location.href='czesci.html'">Serwisy części</button>
        </div>

        <button id="logoutBtn" class="logout-btn" onclick="logout()">Wyloguj</button>

        <!-- FORMULARZ TRASY DLA PZ/WZ -->
        <div id="route-form" class="hidden">
          <input type="text" id="trasa" class="uppercase" placeholder="NR TRASY" required autocomplete="off">
          <input type="text" id="przewoznik" class="uppercase" placeholder="NAZWA FIRMY PRZEWOŹNIKA" required autocomplete="off">
          <input type="text" id="tablicaSam" class="uppercase" placeholder="TABLICA REJESTRACYJNA SAMOCHODU" required autocomplete="off">
          <input type="text" id="tablicaNacz" class="uppercase" placeholder="TABLICA REJESTRACYJNA NACZEPY" required autocomplete="off">

          <div class="form-buttons">
            <button class="back-btn" onclick="backToMenu()">Cofnij</button>
            <button class="ok-btn" onclick="goToSelected()">OK</button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-logo">
      <img src="https://jarogpbs.github.io/MagazynFR/Jaro.png" alt="Created by Jaro">
    </div>
  </div>

  <script>
    const users = {
      "2102": "Jarosław J. ",
      "2009": "Krystian M. ",
    };

    let selectedDestination = "";

    function checkLogin() {
      const kod = document.getElementById("kod").value.trim();
      const login = users[kod];

      if (!login) {
        alert("Niepoprawny kod pracownika.");
        return;
      }

      localStorage.setItem("login", login);

      document.getElementById("user-name").textContent = login;
      document.getElementById("form-section").classList.remove("hidden");
      document.getElementById("login-section").classList.add("hidden");

      showMenu();
    }

    function showMenu() {
  selectedDestination = "";
  document.getElementById("main-menu").classList.remove("hidden");
  document.getElementById("route-form").classList.add("hidden");
  document.getElementById("logoutBtn").classList.remove("hidden");
}

    function showRouteForm(destination) {
      selectedDestination = destination;

      document.getElementById("main-menu").classList.add("hidden");
      document.getElementById("route-form").classList.remove("hidden");
      document.getElementById("logoutBtn").classList.add("hidden");

      const trasa = localStorage.getItem("trasa");
      const przewoznik = localStorage.getItem("przewoznik");
      const tablicaSam = localStorage.getItem("tablicaSam");
      const tablicaNacz = localStorage.getItem("tablicaNacz");

      if (trasa) document.getElementById("trasa").value = trasa;
      if (przewoznik) document.getElementById("przewoznik").value = przewoznik;
      if (tablicaSam) document.getElementById("tablicaSam").value = tablicaSam;
      if (tablicaNacz) document.getElementById("tablicaNacz").value = tablicaNacz;
    }

    function backToMenu() {
      showMenu();
    }

    function goToSelected() {
      if (!selectedDestination) {
        alert("Nie wybrano operacji.");
        return;
      }

      const trasa = document.getElementById("trasa").value.trim().toUpperCase();
      const przewoznik = document.getElementById("przewoznik").value.trim().toUpperCase();
      const tablicaSam = document.getElementById("tablicaSam").value.trim().toUpperCase();
      const tablicaNacz = document.getElementById("tablicaNacz").value.trim().toUpperCase();

      if (!trasa || !przewoznik || !tablicaSam || !tablicaNacz) {
        alert("Proszę uzupełnić wszystkie pola.");
        return;
      }

      const tablicaCombined = `${tablicaSam} / ${tablicaNacz}`;

      localStorage.setItem("trasa", trasa);
      localStorage.setItem("przewoznik", przewoznik);
      localStorage.setItem("tablica", tablicaCombined);
      localStorage.setItem("tablicaSam", tablicaSam);
      localStorage.setItem("tablicaNacz", tablicaNacz);

      const url = `${selectedDestination}?trasa=${encodeURIComponent(trasa)}&przewoznik=${encodeURIComponent(przewoznik)}&tablica=${encodeURIComponent(tablicaCombined)}`;

      window.location.href = url;
    }

    function logout() {
      localStorage.removeItem("login");
      localStorage.removeItem("trasa");
      localStorage.removeItem("przewoznik");
      localStorage.removeItem("tablica");
      localStorage.removeItem("tablicaSam");
      localStorage.removeItem("tablicaNacz");

      document.getElementById("form-section").classList.add("hidden");
      document.getElementById("login-section").classList.remove("hidden");
      document.getElementById("kod").value = "";

      showMenu();
    }

    document.addEventListener("DOMContentLoaded", () => {
      if (sessionStorage.getItem("clearInputsAfterSend") === "1") {
        sessionStorage.removeItem("clearInputsAfterSend");

        localStorage.removeItem("trasa");
        localStorage.removeItem("przewoznik");
        localStorage.removeItem("tablica");
        localStorage.removeItem("tablicaSam");
        localStorage.removeItem("tablicaNacz");

        const trasaEl = document.getElementById("trasa");
        const przewEl = document.getElementById("przewoznik");
        const tabSamEl = document.getElementById("tablicaSam");
        const tabNacEl = document.getElementById("tablicaNacz");

        if (trasaEl) trasaEl.value = "";
        if (przewEl) przewEl.value = "";
        if (tabSamEl) tabSamEl.value = "";
        if (tabNacEl) tabNacEl.value = "";
      }

      const login = localStorage.getItem("login");

      if (login) {
        document.getElementById("user-name").textContent = login;
        document.getElementById("form-section").classList.remove("hidden");
        document.getElementById("login-section").classList.add("hidden");
        showMenu();
      }
    });

    window.addEventListener("pageshow", (ev) => {
      if (ev.persisted) {
        const trasaEl = document.getElementById("trasa");
        const przewEl = document.getElementById("przewoznik");
        const tabSamEl = document.getElementById("tablicaSam");
        const tabNacEl = document.getElementById("tablicaNacz");

        if (trasaEl) trasaEl.value = "";
        if (przewEl) przewEl.value = "";
        if (tabSamEl) tabSamEl.value = "";
        if (tabNacEl) tabNacEl.value = "";
      }
    });
  </script>

  <script src="autoLogout.js"></script>

  <script>
    function reloadAtMidnight() {
      const now = new Date();
      const midnight = new Date();
      midnight.setHours(24, 0, 0, 0);

      const timeToMidnight = midnight - now;

      setTimeout(() => {
        window.location.reload(true);
      }, timeToMidnight);
    }

    reloadAtMidnight();
  </script>

</body>
</html>
