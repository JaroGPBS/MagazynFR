<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Le Magazynier</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Caveat&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      background-color: #1c1c1c;
      font-family: sans-serif;
      color: #f5f5f5;
    }

    .form-wrapper {
      max-width: 500px;
      margin: auto;
      background: #333333;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 90vh;
    }

    .logo {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .logo-left {
      font-family: 'Informal Roman', cursive;
      color: #f9f9f9;
      line-height: 0.9;
      margin-left: 30px;
    }

    .logo-left .main {
      font-size: 3rem;
    }

    .logo-left .sub {
      font-size: 2rem;
      transform: translateY(-11px) translateX(26px);
      opacity: 0.8;
    }

    input {
      margin: 6px 0 20px;
      padding: 10px;
      width: 100%;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    input.uppercase {
      text-transform: uppercase;
    }

    .hidden {
      display: none !important;
    }

    #form-section {
      display: flex;
      flex-direction: column;
      min-height: 58vh;
    }

    button {
      padding: 12px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background-color: #666;
      color: white;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #888;
    }

    .main-menu {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 20px;
    }

    .inventory-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .inventory-btn {
      width: 42%;
      height: 34px;
      font-size: 0.85rem;
      font-weight: bold;
      background-color: #8a4b24;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;

      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .main-menu > button {
      width: 100%;
      height: 52px;
      font-size: 1.1rem;
      font-weight: bold;
    }

    .form-buttons {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    .form-buttons button {
      flex: 1;
      height: 48px;
      font-weight: bold;
    }

    .ok-btn {
      background-color: #2e7d32;
    }

    .ok-btn:hover {
      background-color: #3fa344;
    }

    .back-btn {
      background-color: #555;
    }

    .logout-btn {
      background-color: #aa3333;
      width: 75%;
      height: 42px;
      font-size: 0.95rem;
      font-weight: bold;
      margin: auto auto 0 auto;
      display: block;
    }

    .logout-btn:hover {
      background-color: #cc4444;
    }

    .footer-logo {
      margin-top: 20px;
      text-align: center;
    }

    .footer-logo img {
      width: 45%;
      max-width: 200px;
      height: auto;
      margin-top: 20px;
    }

    .team-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .team-modal-box {
      width: 100%;
      max-width: 380px;
      background: #333;
      border: 1px solid #666;
      border-radius: 14px;
      padding: 20px;
      color: white;
      box-shadow: 0 0 18px rgba(0,0,0,0.45);
    }

    .team-modal-title {
      font-size: 1.15rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 12px;
    }

    .team-modal-subtitle {
      font-size: 0.85rem;
      color: #ddd;
      text-align: center;
      margin-bottom: 12px;
    }

    .team-modal-input {
      background-color: #f2eadf !important;
      color: #1c1c1c !important;
      border: 2px solid #b88a5a !important;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .team-modal-input::placeholder {
      color: #6b5b4a !important;
    }

    .team-modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .team-modal-buttons button {
      flex: 1;
      height: 46px;
      font-weight: bold;
    }

    .team-cancel-btn {
      background-color: #555;
    }

    .team-ok-btn {
      background-color: #2e7d32;
    }

    .team-ok-btn:hover {
      background-color: #3fa344;
    }
  </style>
</head>

<body>

  <div class="form-wrapper" autocomplete="off">
    <div>

      <div class="logo">
        <div class="logo-left">
          <div class="main">Le Magazynier</div>
          <div class="sub">Belleville</div>
        </div>
      </div>

      <!-- LOGOWANIE -->
      <div id="login-section">
        <input type="password" id="kod" placeholder="Kod pracownika" required autocomplete="off">
        <button id="loginBtn" onclick="checkLogin()" style="width:100%;">Zaloguj</button>
      </div>

      <!-- MENU PO ZALOGOWANIU -->
      <div id="form-section" class="hidden">
        <p>Witaj, <strong id="user-name"></strong>!</p>

        <div id="main-menu" class="main-menu">
          <button onclick="showRouteForm('pz.html')">Przyjęcie moduły</button>
          <button onclick="showRouteForm('wz.html')">Wydanie moduły</button>
          <button onclick="openCzesciTeamModal()">Serwisy części</button>
        </div>

        <button id="logoutBtn" class="logout-btn" onclick="logout()">Wyloguj</button>

        <div id="inventoryWrap" class="inventory-wrap">
          <button class="inventory-btn" onclick="window.location.replace('inwentaryzacja.html?v=' + Date.now())">Inwentaryzacja</button>
        </div>
        
        <!-- FORMULARZ TRASY DLA PZ/WZ -->
        <div id="route-form" class="hidden">
          <input type="text" id="trasa" class="uppercase" placeholder="NR TRASY" required autocomplete="off">
          <input type="text" id="przewoznik" class="uppercase" placeholder="NAZWA FIRMY PRZEWOŹNIKA" required autocomplete="off">
          <input type="text" id="tablicaSam" class="uppercase" placeholder="TABLICA REJESTRACYJNA SAMOCHODU" required autocomplete="off">
          <input type="text" id="tablicaNacz" class="uppercase" placeholder="TABLICA REJESTRACYJNA NACZEPY" required autocomplete="off">

          <div class="form-buttons">
            <button class="back-btn" onclick="backToMenu()">Cofnij</button>
            <button class="ok-btn" onclick="goToSelected()">OK</button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-logo">
      <img src="https://jarogpbs.github.io/MagazynFR/Jaro.png" alt="Created by Jaro">
    </div>
  </div>

  <!-- OKNO EKIPY DLA SERWISÓW CZĘŚCI -->
  <div id="teamModal" class="team-modal">
    <div class="team-modal-box">
      <div class="team-modal-title">Serwisy części</div>
      <div class="team-modal-subtitle">Wpisz nazwę ekipy / trasy</div>

      <input
        type="text"
        id="teamModalInput"
        class="team-modal-input"
        placeholder="EKIPA / TRASA"
        autocomplete="off"
      >

      <div class="team-modal-buttons">
        <button class="team-cancel-btn" onclick="closeCzesciTeamModal()">Anuluj</button>
        <button class="team-ok-btn" onclick="confirmCzesciTeam()">OK</button>
      </div>
    </div>
  </div>

  <script>
    const users = {
      "2102": "Jarosław J. ",
      "2009": "Krystian M. ",
    };

    let selectedDestination = "";

    function checkLogin() {
      const kod = document.getElementById("kod").value.trim();
      const login = users[kod];

      if (!login) {
        alert("Niepoprawny kod pracownika.");
        return;
      }

      localStorage.setItem("login", login);

      document.getElementById("user-name").textContent = login;
      document.getElementById("form-section").classList.remove("hidden");
      document.getElementById("login-section").classList.add("hidden");

      showMenu();
    }

    function showMenu() {
      selectedDestination = "";
      document.getElementById("main-menu").classList.remove("hidden");
      document.getElementById("route-form").classList.add("hidden");
      document.getElementById("logoutBtn").classList.remove("hidden");

      const inventoryWrap = document.getElementById("inventoryWrap");
      if (inventoryWrap) inventoryWrap.classList.remove("hidden");
    }

    function showRouteForm(destination) {
      selectedDestination = destination;

      document.getElementById("main-menu").classList.add("hidden");
      document.getElementById("route-form").classList.remove("hidden");
      document.getElementById("logoutBtn").classList.add("hidden");

      const inventoryWrap = document.getElementById("inventoryWrap");
      if (inventoryWrap) inventoryWrap.classList.add("hidden");

      const trasa = localStorage.getItem("trasa");
      const przewoznik = localStorage.getItem("przewoznik");
      const tablicaSam = localStorage.getItem("tablicaSam");
      const tablicaNacz = localStorage.getItem("tablicaNacz");

      if (trasa) document.getElementById("trasa").value = trasa;
      if (przewoznik) document.getElementById("przewoznik").value = przewoznik;
      if (tablicaSam) document.getElementById("tablicaSam").value = tablicaSam;
      if (tablicaNacz) document.getElementById("tablicaNacz").value = tablicaNacz;
    }

    function openCzesciTeamModal() {
      const modal = document.getElementById("teamModal");
      const input = document.getElementById("teamModalInput");
      const saved = localStorage.getItem("serwisEkipa") || "";

      input.value = saved;
      modal.style.display = "flex";

      setTimeout(() => {
        input.focus();
      }, 100);
    }

    function closeCzesciTeamModal() {
      const modal = document.getElementById("teamModal");
      const input = document.getElementById("teamModalInput");

      input.value = "";
      modal.style.display = "none";
    }

    function confirmCzesciTeam() {
      const input = document.getElementById("teamModalInput");
      const cleanEkipa = input.value.trim().toUpperCase();

      if (!cleanEkipa) {
        alert("Musisz wpisać nazwę ekipy / trasy.");
        return;
      }

      localStorage.setItem("serwisEkipa", cleanEkipa);
      window.location.replace("czesci.html?v=" + Date.now());
    }

    function backToMenu() {
      showMenu();
    }

    function goToSelected() {
      if (!selectedDestination) {
        alert("Nie wybrano operacji.");
        return;
      }

      const trasa = document.getElementById("trasa").value.trim().toUpperCase();
      const przewoznik = document.getElementById("przewoznik").value.trim().toUpperCase();
      const tablicaSam = document.getElementById("tablicaSam").value.trim().toUpperCase();
      const tablicaNacz = document.getElementById("tablicaNacz").value.trim().toUpperCase();

      if (!trasa || !przewoznik || !tablicaSam || !tablicaNacz) {
        alert("Proszę uzupełnić wszystkie pola.");
        return;
      }

      const tablicaCombined = `${tablicaSam} / ${tablicaNacz}`;

      localStorage.setItem("trasa", trasa);
      localStorage.setItem("przewoznik", przewoznik);
      localStorage.setItem("tablica", tablicaCombined);
      localStorage.setItem("tablicaSam", tablicaSam);
      localStorage.setItem("tablicaNacz", tablicaNacz);

      const url = `${selectedDestination}?trasa=${encodeURIComponent(trasa)}&przewoznik=${encodeURIComponent(przewoznik)}&tablica=${encodeURIComponent(tablicaCombined)}&v=${Date.now()}`;

      window.location.replace(url);
    }

    function logout() {
      localStorage.removeItem("login");
      localStorage.removeItem("trasa");
      localStorage.removeItem("przewoznik");
      localStorage.removeItem("tablica");
      localStorage.removeItem("tablicaSam");
      localStorage.removeItem("tablicaNacz");
      localStorage.removeItem("serwisEkipa");

      document.getElementById("form-section").classList.add("hidden");
      document.getElementById("login-section").classList.remove("hidden");
      document.getElementById("kod").value = "";

      closeCzesciTeamModal();
      showMenu();
    }

    document.addEventListener("DOMContentLoaded", () => {
      if (sessionStorage.getItem("clearInputsAfterSend") === "1") {
        sessionStorage.removeItem("clearInputsAfterSend");

        localStorage.removeItem("trasa");
        localStorage.removeItem("przewoznik");
        localStorage.removeItem("tablica");
        localStorage.removeItem("tablicaSam");
        localStorage.removeItem("tablicaNacz");

        const trasaEl = document.getElementById("trasa");
        const przewEl = document.getElementById("przewoznik");
        const tabSamEl = document.getElementById("tablicaSam");
        const tabNacEl = document.getElementById("tablicaNacz");

        if (trasaEl) trasaEl.value = "";
        if (przewEl) przewEl.value = "";
        if (tabSamEl) tabSamEl.value = "";
        if (tabNacEl) tabNacEl.value = "";
      }

      const login = localStorage.getItem("login");

      if (login) {
        document.getElementById("user-name").textContent = login;
        document.getElementById("form-section").classList.remove("hidden");
        document.getElementById("login-section").classList.add("hidden");
        showMenu();
      }

      const teamInput = document.getElementById("teamModalInput");
      if (teamInput) {
        teamInput.addEventListener("input", () => {
          teamInput.value = teamInput.value.toUpperCase();
        });

        teamInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            confirmCzesciTeam();
          }

          if (e.key === "Escape") {
            closeCzesciTeamModal();
          }
        });
      }
    });

    window.addEventListener("pageshow", (ev) => {
      if (ev.persisted) {
        const trasaEl = document.getElementById("trasa");
        const przewEl = document.getElementById("przewoznik");
        const tabSamEl = document.getElementById("tablicaSam");
        const tabNacEl = document.getElementById("tablicaNacz");

        if (trasaEl) trasaEl.value = "";
        if (przewEl) przewEl.value = "";
        if (tabSamEl) tabSamEl.value = "";
        if (tabNacEl) tabNacEl.value = "";
      }
    });
  </script>

  <script src="autoLogout.js"></script>

  <script>
    function reloadAtMidnight() {
      const now = new Date();
      const midnight = new Date();
      midnight.setHours(24, 0, 0, 0);

      const timeToMidnight = midnight - now;

      setTimeout(() => {
        window.location.reload(true);
      }, timeToMidnight);
    }

    reloadAtMidnight();
  </script>

</body>
</html>
