<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Przyjęcie – Le Magazynier</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
  <audio id="beepSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" preload="auto"></audio>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      background-color: #1c1c1c;
      font-family: sans-serif;
      color: #f5f5f5;
    }

    .form-wrapper {
      max-width: 500px;
      margin: auto;
      background: #333;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 90vh;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .logo {
      font-family: 'Informal Roman', cursive;
      color: #f9f9f9;
      font-size: 2.5rem;
      margin-left: 40px;
    }

    .back-button {
      width: 25%;
      min-width: 80px;
      padding: 8px;
      font-size: 0.9rem;
      border: none;
      border-radius: 6px;
      background-color: #555;
      color: #fff;
      cursor: pointer;
      text-align: center;
    }

    .back-button:hover { background-color: #777; }

    .data-display {
      font-size: 0.9rem;
      background-color: #444;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      font-size: 1rem;
      border: 1px solid #555;
      border-radius: 4px;
    }

    input {
      background-color: #222;
      color: #f5f5f5;
    }

    input::placeholder { color: #999; }

    button {
      cursor: pointer;
      background-color: #666;
      color: white;
      border: none;
      font-weight: bold;
    }

    button:hover { background-color: #777; }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #readerModul {
      width: 100%;
      max-width: 400px;
      margin: 16px auto;
    }

    ul {

      display: flex;

    .code-text {

      padding: 6px;
    }

    .remove-btn {
      color: red;

      padding: 0 6px;
      font-weight: bold;

    }

    .footer-logo {
      text-align: center;
      margin-top: 20px;
    }

    .footer-logo img {
      width: 40%;
      max-width: 200px;
      height: auto;
    }

    .list-header {
      display:flex;
      align-items:center;
      gap:8px;

    }

    .badge {
      display:inline-block;
      padding:1px 6px;
      border:1px solid #666;
      border-radius:999px;
      font-size:.7rem;
      background:#222;
      color:#f5f5f5;
    }

    .section-title {
      margin-top: 22px;
      padding-top: 14px;
      border-top: 1px solid #555;
      font-size: 1.1rem;
      font-weight: bold;
      color: #ffffff;
    }

    .search-results {
      margin: 8px 0 14px;
      border: 1px solid #555;
      border-radius: 8px;
      overflow: hidden;
      display: none;
    }

    .result-item {
      padding: 10px;
      background: #222;
      border-bottom: 1px solid #444;
      cursor: pointer;
    }

    .result-item:last-child {
      border-bottom: none;
    }

    .result-item:hover {
      background: #444;
    }

    .part-name {
  flex: 1;
  font-size: 0.85rem;
  word-break: normal;
  overflow-wrap: break-word;
  line-height: 1.2;
}

    .part-qty {
  width: 50px;
  min-width: 50px;
  max-width: 50px;
  text-align: center;
  font-weight: bold;
  font-size: 0.85rem;
  padding: 4px 6px;
  border-radius: 6px;
  background: #1c1c1c;
  border: 1px solid #555;
}

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 18px;
    }

    .overlay-box {
      width: 100%;
      max-width: 360px;
      background: #333;
      padding: 22px;
      border-radius: 12px;

    }

    .modal-title {
      font-size: 1.1rem;

    .choice-row {
      display: flex;

    }

    .ok-btn {

    }

    .cancel-btn {
      background-color: #555;

    }

    .hidden {
      display: none !important;
    }

    @media screen and (max-width: 600px) {
      .logo { font-size: 2rem; }
    }
    .base-status {
      width: 100%;
      min-height: 34px;
      margin: 18px 0 8px;
      padding: 8px 10px;
      border: 1px solid #555;
      border-radius: 8px;
      background-color: #2a2a2a;

      text-align: center;

      font-weight: normal;
    }

    .base-status.error {
      color: #ffd600;
      font-weight: bold;
      border-color: #aa3333;
    }
  </style>
</head>

<body>

<!-- PRZYCISK MODUŁY -->
<button id="showModulesBtn" onclick="showModulesSection()" style="
  width: 100%;

</button>

<!-- MODUŁY -->
<div id="modulesSection" class="hidden">
  <div class="section-title">MODUŁY</div>

  <div id="scanButtonsRow" style="
    display: flex;
    gap: 8px;
    margin: 10px 0;
  ">
    <button id="startOcrBtn" onclick="startOcrScanning()" style="
      flex: 1;

      cursor: pointer;

    </button>

    <button id="startQrBtn" onclick="startQrScanning()" style="
      flex: 1;

  </div>

  <div id="readerModul" style="display: none;"></div>

    <!-- PRZYCISK CZĘŚCI -->

      border: none;

    </button>

    <div id="partsSection" class="hidden">

      <input type="text" id="searchInput" placeholder="Szukaj części po nazwie" autocomplete="off" disabled>
      <div id="searchResults" class="search-results"></div>

      <div class="list-header">

<!-- ILOŚĆ CZĘŚCI -->
<div id="partModal" class="overlay">
  <div class="overlay-box">
    <div class="modal-title">Ilość części</div>
    <div id="modalPartName" class="modal-part"></div>

    <input type="number" id="modalQty" min="1" value="1" placeholder="ILOŚĆ">

<script>
function goBack() {
  window.location.replace("index.html");
}

const allowed = ["FM","LQ","RQ","XS","ODL","ODR","CU","DUO","HICU","HIDUO","HIUNO","FMB","LQB","RQB","CUIND","EXTIND","CUOUT","EXTOUT"];
const scriptURL = "https://script.google.com/macros/s/AKfycby5xJAHto5XHSwXGWDoaUyjvZHB_rEBd6pqhUkk5JrvPw807HazHGvMKr00ZrG5rLGwIg/exec";

let codes = [];

let bazaCzesci = [];
let listaCzesci = [];
let selectedPart = null;

let html5QrModul;
let isModuleScanning = false;

function showPartsSection() {
  const section = document.getElementById("partsSection");
  const btn = document.getElementById("showPartsBtn");

  if (section.classList.contains("hidden")) {
    section.classList.remove("hidden");

    btn.style.height = "29px";
    btn.style.fontSize = "0.8rem";
    btn.style.margin = "12px 0 4px";
    btn.style.padding = "0";
    btn.style.display = "flex";
    btn.style.alignItems = "center";
    btn.style.justifyContent = "center";
  } else {
    section.classList.add("hidden");

    btn.style.height = "48px";
    btn.style.fontSize = "1rem";
    btn.style.margin = "18px 0 8px";
    btn.style.padding = "10px";
    btn.style.display = "block";
  }
}
function showModulesSection() {
  const section = document.getElementById("modulesSection");
  const btn = document.getElementById("showModulesBtn");

  if (section.classList.contains("hidden")) {
    section.classList.remove("hidden");

    btn.style.height = "29px";
    btn.style.fontSize = "0.8rem";
    btn.style.margin = "12px 0 4px";
    btn.style.padding = "0";
    btn.style.display = "flex";
    btn.style.alignItems = "center";
    btn.style.justifyContent = "center";
  } else {
    section.classList.add("hidden");

    btn.style.height = "48px";
    btn.style.fontSize = "1rem";
    btn.style.margin = "10px 0 8px";
    btn.style.padding = "10px";
    btn.style.display = "block";
  }
}
function saveCodes() {
  localStorage.setItem("codesPZ", JSON.stringify(codes));
}

function updateList() {
  const list = document.getElementById("codeList");
  const count = document.getElementById("codeCount");

  list.innerHTML = "";
  count.textContent = String(codes.length);

  codes.forEach((item, index) => {
    const li = document.createElement("li");

    const inputNote = document.createElement("input");
    inputNote.type = "text";
    inputNote.placeholder = "TYP";
    inputNote.className = "note-input";
    inputNote.value = item.note || "";
    inputNote.setAttribute("list", "typList");
    inputNote.style.borderColor = item.note && allowed.includes(item.note) ? "#0f0" : "#555";

    inputNote.oninput = () => {
      const val = inputNote.value.toUpperCase().trim();
      inputNote.value = val;
      codes[index].note = val;
      inputNote.style.borderColor = allowed.includes(val) ? "#0f0" : "red";
      saveCodes();
    };

    const codeText = document.createElement("input");
    codeText.type = "text";
    codeText.value = item.value;
    codeText.className = "code-text";

    codeText.onchange = () => {
      const cleaned = cleanSN(codeText.value);
      const detectedType = detectModuleType(cleaned);

      codeText.value = cleaned;
      codes[index].value = cleaned;

      if (detectedType) {
        codes[index].note = detectedType;
      }

      saveCodes();
      updateList();
    };

    const nokCheckbox = document.createElement("input");
    nokCheckbox.type = "checkbox";
    nokCheckbox.checked = !!item.nok;
    nokCheckbox.style.width = "18px";
    nokCheckbox.style.height = "18px";
    nokCheckbox.style.cursor = "pointer";

    nokCheckbox.onchange = () => {
      codes[index].nok = nokCheckbox.checked;
      saveCodes();
    };

    const nokLabel = document.createElement("label");
    nokLabel.style.display = "flex";
    nokLabel.style.alignItems = "center";
    nokLabel.style.gap = "4px";
    nokLabel.style.marginLeft = "auto";
    nokLabel.appendChild(nokCheckbox);
    nokLabel.appendChild(document.createTextNode("NOK"));

    const remove = document.createElement("span");
    remove.className = "remove-btn";
    remove.textContent = "✕";
    remove.title = "Usuń";
    remove.onclick = () => removeCode(index);

    li.appendChild(inputNote);
    li.appendChild(codeText);
    li.appendChild(nokLabel);
    li.appendChild(remove);
    list.appendChild(li);
  });
}
let lastManualSN = "";

function formatManualSN(input) {
  let val = input.value.toUpperCase();

  const isDeleting = val.length < lastManualSN.length;

  if (isDeleting) {
    input.value = val;
    lastManualSN = val;
    return;
  }

  if (val.includes("/")) {
    input.value = val;
    lastManualSN = val;
    return;
  }

  if (/^\d{2}$/.test(val)) {
    val = val + "/";
  }

  input.value = val;
  lastManualSN = val;
}

function cleanSN(value) {
  let val = String(value || "").toUpperCase().trim();

  val = val.replace(/\s*MZ\s*$/i, "");
  val = val.replace(/\s+([A-Z]{2})$/i, "$1");

  return val.trim();
}


function detectModuleType(value) {
  const sn = cleanSN(value);
  const body = sn.includes("/") ? sn.split("/").pop() : sn;

  // Prefiksy konfliktowe zostają bez automatycznego typu:
  // CDD, CDI, LD, RD
  // Kolejność jest ważna: najpierw dłuższe prefiksy, potem krótsze.
  const rules = [
    ["LQBN", "LQB"],
    ["RQBN", "RQB"],
    ["LSUX", "XS"],
    ["CDHI", "HICU"],
    ["CQBM", "FMB"],

    ["CQM", "FM"],
    ["CQU", "FM"],

    ["LQU", "LQ"],
    ["RQU", "RQ"],

    ["LSX", "XS"],
    ["CDH", "HICU"],

    ["LDI", "DUO"],
    ["RDI", "DUO"],
    ["RDH", "HIDUO"],

    ["RSH", "HIUNO"],
    ["LDU", "ODL"],
    ["RDU", "ODR"],

    ["CDJ", "CUIND"],
    ["DDJ", "EXTIND"],
    ["CDT", "CUOUT"],
    ["DDT", "EXTOUT"],

    ["LQ", "LQ"],
    ["RQ", "RQ"],
    ["LS", "XS"]
  ];

  for (const [prefix, type] of rules) {
    if (body.startsWith(prefix)) return type;
  }

  return "";
}

function addManual() {
  const input = document.getElementById("manualInput");
  const val = cleanSN(input.value);

  if (!val || val.length < 3) {
    alert("Kod zbyt krótki lub pusty.");
    return;
  }

  const exists = codes.find(c => cleanSN(c.value) === val);

  if (!exists) {
    codes.unshift({ value: val, note: detectModuleType(val), nok: false });
    saveCodes();
    updateList();
  }

  input.value = "";
  lastManualSN = "";
}

function removeCode(index) {
  codes.splice(index, 1);
  saveCodes();
  updateList();
}

function normalizeText(text) {
  return String(text || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

const PARTS_BASE_CACHE_KEY = "partsBaseCache_v1";
const PARTS_BASE_TIME_KEY = "partsBaseCacheTime_v1";
const PARTS_BASE_MAX_AGE = 7 * 24 * 60 * 60 * 1000;

function formatBaseDate(timestamp) {
  const d = new Date(timestamp);

  const hh = String(d.getHours()).padStart(2, "0");
  const mm = String(d.getMinutes()).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  const month = String(d.getMonth() + 1).padStart(2, "0");

  return `${hh}:${mm} ${day}.${month}`;
}

function setBaseStatus(text, isError) {
  const el = document.getElementById("partsBaseStatus");
  if (!el) return;

  el.textContent = text;

  if (isError) {
    el.classList.add("error");
  } else {
    el.classList.remove("error");
  }
}

function loadPartsBaseFromCache() {
  const savedBase = localStorage.getItem(PARTS_BASE_CACHE_KEY);
  const savedTime = Number(localStorage.getItem(PARTS_BASE_TIME_KEY) || 0);

  if (!savedBase || !savedTime) {
    setBaseStatus("Baza części: brak", false);
    return false;
  }

  try {
    const parsed = JSON.parse(savedBase);

    if (!Array.isArray(parsed) || parsed.length === 0) {
      setBaseStatus("Baza części: brak", false);
      return false;
    }

    bazaCzesci = parsed;
    document.getElementById("searchInput").disabled = false;
    setBaseStatus("Baza z dnia: " + formatBaseDate(savedTime), false);

    return savedTime;
  } catch {
    setBaseStatus("BŁĄD AKTUALIZACJI", true);
    return false;
  }
}

function refreshPartsBaseInBackground() {
  fetch(scriptURL + "?akcja=bazaCzesci")
    .then(res => res.json())
    .then(data => {
      if (!data.ok || !Array.isArray(data.czesci) || data.czesci.length === 0) {
        setBaseStatus("BŁĄD AKTUALIZACJI", true);
        return;
      }

      bazaCzesci = data.czesci;

      const now = Date.now();
      localStorage.setItem(PARTS_BASE_CACHE_KEY, JSON.stringify(bazaCzesci));
      localStorage.setItem(PARTS_BASE_TIME_KEY, String(now));

      document.getElementById("searchInput").disabled = false;
      setBaseStatus("Baza z dnia: " + formatBaseDate(now), false);
    })
    .catch(err => {
      setBaseStatus("BŁĄD AKTUALIZACJI", true);
    });
}

function forceRefreshPartsBase() {
  setBaseStatus("Aktualizuję bazę części...", false);
  refreshPartsBaseInBackground();
}

function loadPartsBase() {
  const savedTime = loadPartsBaseFromCache();

  if (!savedTime) {
    refreshPartsBaseInBackground();
    return;
  }

  const age = Date.now() - savedTime;

  if (age > PARTS_BASE_MAX_AGE) {
    refreshPartsBaseInBackground();
  }
}

function searchParts() {
  const input = document.getElementById("searchInput");
  const resultsBox = document.getElementById("searchResults");
  const query = normalizeText(input.value);

  resultsBox.innerHTML = "";

  if (query.length < 2) {
    resultsBox.style.display = "none";
    return;
  }

  const results = bazaCzesci
    .filter(part => {
      const nazwa = normalizeText(part.nazwa);
      const indeks = normalizeText(part.indeks);
      return nazwa.includes(query) || indeks.includes(query);
    })
    .slice(0, 20);

  if (results.length === 0) {
    resultsBox.style.display = "block";
    const empty = document.createElement("div");
    empty.className = "result-item";
    empty.textContent = "Brak wyników";
    resultsBox.appendChild(empty);
    return;
  }

  results.forEach(part => {
    const div = document.createElement("div");
    div.className = "result-item";
    div.textContent = part.nazwa;

    div.onclick = () => {
      resultsBox.style.display = "none";
      input.value = "";
      openPartModal(part);
    };

    resultsBox.appendChild(div);
  });

  resultsBox.style.display = "block";
}

function openPartModal(part) {
  selectedPart = part;
  document.getElementById("modalPartName").textContent = part.nazwa;
  document.getElementById("modalQty").value = 1;
  document.getElementById("partModal").style.display = "flex";
}

function closePartModal() {
  selectedPart = null;
  document.getElementById("partModal").style.display = "none";
}

function confirmPart() {
  if (!selectedPart) return;

  const qty = Number(document.getElementById("modalQty").value || 0);

  if (!qty || qty <= 0) {
    alert("Podaj ilość większą od zera.");
    return;
  }

  addPartToList({
    indeks: selectedPart.indeks,
    nazwa: selectedPart.nazwa,
    ilosc: qty
  });

  closePartModal();
}

function addPartToList(part) {
  const existing = listaCzesci.find(item =>
    String(item.indeks || "").trim().toUpperCase() === String(part.indeks || "").trim().toUpperCase()
  );

  if (existing) {
    existing.ilosc = Number(existing.ilosc || 0) + Number(part.ilosc || 0);
  } else {
    listaCzesci.unshift(part);
  }

  savePartsList();
  updatePartsList();
}

function savePartsList() {
  localStorage.setItem("partsPZTest", JSON.stringify(listaCzesci));
}

function updatePartsList() {
  const list = document.getElementById("partList");
  const count = document.getElementById("partCount");

  list.innerHTML = "";
  count.textContent = String(listaCzesci.length);

  listaCzesci.forEach((item, index) => {
    const li = document.createElement("li");

    const name = document.createElement("div");
    name.className = "part-name";
    name.textContent = item.nazwa || "";

    const qty = document.createElement("input");
    qty.type = "number";
    qty.min = "1";
    qty.value = Math.abs(Number(item.ilosc || 0));
    qty.className = "part-qty";

    qty.oninput = () => {
      const newQty = Number(qty.value || 0);
      if (newQty > 0) {
        listaCzesci[index].ilosc = newQty;
        savePartsList();
      }
    };

    const remove = document.createElement("span");
    remove.className = "remove-btn";
    remove.textContent = "✕";
    remove.title = "Usuń";

    remove.onclick = () => {
      listaCzesci.splice(index, 1);
      savePartsList();
      updatePartsList();
    };

    li.appendChild(name);
    li.appendChild(qty);
    li.appendChild(remove);
    list.appendChild(li);
  });
}

function sendData() {
  const login = localStorage.getItem("login") || "";
  const trasa = localStorage.getItem("trasa") || "";
  const przewoznik = localStorage.getItem("przewoznik") || "";
  const tablica = localStorage.getItem("tablica") || "";
  const dodatkoweInfo = document.getElementById("dodatkoweInfo").value.trim();

  if (!login || !trasa || !przewoznik || !tablica || codes.length === 0) {
    alert("Brakuje danych lub lista modułów jest pusta.");
    return;
  }

  for (const c of codes) {
    const typ = (c.note || "").toString().trim().toUpperCase();

    if (!allowed.includes(typ)) {
      alert(`Nieprawidłowy TYP: "${typ}". Wybierz z listy.`);
      return;
    }
  }

  if (!confirm("Czy na pewno chcesz wysłać dane?")) return;

  document.getElementById("sendingOverlay").style.display = "flex";

  const finalData = codes.map(c => {
    const kod = (c.value || "").toString().trim().toUpperCase();
    const typ = (c.note || "").toString().trim().toUpperCase();
    const status = c.nok ? " - NOK" : "";
    return `${typ} - ${kod}${status}`.replace(/^undefined\s*-\s*/i, "");
  });

  const formData = new FormData();
  formData.append("login", login);
  formData.append("trasa", trasa.toUpperCase());
  formData.append("przewoznik", przewoznik.toUpperCase());
  formData.append("tablica", tablica.toUpperCase());
  formData.append("dodatkowe", dodatkoweInfo || "-");
  formData.append("kody", JSON.stringify(finalData));
  formData.append("czesci", JSON.stringify(listaCzesci));
  formData.append("strona", "pz");

  fetch(scriptURL, { method: "POST", body: formData })
    .then(res => res.text())
    .then(txt => {
      alert("✅ Dane wysłane.");

      codes = [];
      localStorage.removeItem("codesPZ");
      updateList();

      localStorage.removeItem("partsPZTest");
      listaCzesci = [];
      updatePartsList();

      localStorage.removeItem("trasa");
      localStorage.removeItem("przewoznik");
      localStorage.removeItem("tablica");
      localStorage.removeItem("tablicaSam");
      localStorage.removeItem("tablicaNacz");

      sessionStorage.setItem("clearInputsAfterSend", "1");
      window.location.replace("index.html");
    })
    .catch(err => {
      document.getElementById("sendingOverlay").style.display = "none";
      document.getElementById("status").innerText = "❌ Błąd: " + err;
    });
}

document.addEventListener("DOMContentLoaded", () => {
  const savedCodes = localStorage.getItem("codesPZ");

  if (savedCodes) {
    try {
      const parsed = JSON.parse(savedCodes);

      codes = Array.isArray(parsed)
        ? parsed.map(it => {
            const note = (it.note ?? it.typ ?? "").toString().toUpperCase().trim();
            const value = (it.value ?? it.kod ?? "").toString().toUpperCase().trim();
            return { value, note, nok: !!it.nok };
          })
        : [];

      localStorage.setItem("codesPZ", JSON.stringify(codes));
    } catch {
      codes = [];
    }
  }

  updateList();

  const savedParts = localStorage.getItem("partsPZTest");

  if (savedParts) {
    try {
      const parsed = JSON.parse(savedParts);
      listaCzesci = Array.isArray(parsed) ? parsed : [];
    } catch {
      listaCzesci = [];
    }
  }

  updatePartsList();

  const login = localStorage.getItem("login") || "brak";
  const trasa = localStorage.getItem("trasa") || "brak";
  const przewoznik = localStorage.getItem("przewoznik") || "brak";
  const tablica = localStorage.getItem("tablica") || "brak";

  document.getElementById("daneUzytkownika").innerText = `${login}  -  ${trasa}  -  ${przewoznik}  -  ${tablica}`;

  document.getElementById("searchInput").addEventListener("input", searchParts);

  loadPartsBase();
});

function startQrScanning() {
  if (isModuleScanning) return;
  isModuleScanning = true;

  document.getElementById("scanButtonsRow").style.display = "none";
  const readerDiv = document.getElementById("readerModul");
  readerDiv.style.display = "block";
  readerDiv.innerHTML = "";

  html5QrModul = new Html5Qrcode("readerModul");

  Html5Qrcode.getCameras().then(cameras => {
    if (cameras && cameras.length) {
      const backCam = cameras.find(cam => (cam.label || "").toLowerCase().includes("back")) || cameras[0];

      html5QrModul.start(backCam.id, { fps: 10, qrbox: 250 }, text => {
        stopModuleScanning();

        addModuleCode(text);

        if ("vibrate" in navigator) navigator.vibrate(200);

        const beep = document.getElementById("beepSound");
        if (beep) beep.play().catch(() => {});
      });
    } else {
      alert("Nie wykryto kamery.");
      isModuleScanning = false;
      document.getElementById("scanButtonsRow").style.display = "flex";
      document.getElementById("readerModul").style.display = "none";
    }
  }).catch(err => {
    alert("Błąd kamery: " + err);
    isModuleScanning = false;
    document.getElementById("scanButtonsRow").style.display = "flex";
    document.getElementById("readerModul").style.display = "none";
  });
}

function addModuleCode(rawValue) {
  const val = cleanSN(rawValue);

  if (!val || val.length < 3) {
    alert("Nie udało się odczytać poprawnego numeru S/N.");
    return false;
  }

  const exists = codes.find(c => cleanSN(c.value) === val);

  if (!exists) {
    codes.unshift({ value: val, note: detectModuleType(val), nok: false });
    saveCodes();
    updateList();
  }

  return true;
}

function startOcrScanning() {
  if (isModuleScanning) return;

  const input = document.getElementById("ocrImageInput");
  if (!input) {
    alert("Brak pola OCR w pliku.");
    return;
  }

  input.value = "";
  input.click();
}

async function handleOcrImage(input) {
  const file = input.files && input.files[0];
  if (!file) return;

  const overlay = document.getElementById("ocrOverlay");
  const status = document.getElementById("ocrStatus");

  if (overlay) overlay.style.display = "flex";
  if (status) status.innerHTML = "⏳ Przygotowuję zdjęcie S/N...<br>Proszę czekać.";

  try {
    if (typeof Tesseract === "undefined") {
      throw new Error("Biblioteka OCR nie została załadowana.");
    }

    const image = await loadImageFromFile(file);

    // 1) Najpierw czytamy tylko pas z numerem S/N, a nie całe zdjęcie.
    const snCanvas = prepareOcrCanvas(image, "sn");

    if (status) status.innerHTML = "⏳ OCR czyta tylko pole S/N...<br>Proszę czekać.";

    const snResult = await Tesseract.recognize(snCanvas, "eng", {
      tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789/.-: ",
      logger: info => {
        if (!status || !info || info.status !== "recognizing text") return;
        const pct = Math.round((info.progress || 0) * 100);
        status.innerHTML = "⏳ OCR czyta pole S/N...<br>Postęp: " + pct + "%";
      }
    });

    const snText = snResult && snResult.data ? snResult.data.text : "";
    let serial = extractSerialFromOcrText(snText);

    // 2) Jeżeli numer został odczytany bez roku XX/, próbujemy odczytać rok z etykiety.
    if (serial && !/^\d{2}\//.test(serial)) {
      if (status) status.innerHTML = "⏳ Numer bez roku — szukam roku produkcji...";

      const yearCanvas = prepareOcrCanvas(image, "year");
      const yearResult = await Tesseract.recognize(yearCanvas, "eng", {
        tessedit_char_whitelist: "0123456789 ",
        logger: info => {
          if (!status || !info || info.status !== "recognizing text") return;
          const pct = Math.round((info.progress || 0) * 100);
          status.innerHTML = "⏳ OCR czyta rok produkcji...<br>Postęp: " + pct + "%";
        }
      });

      const yearText = yearResult && yearResult.data ? yearResult.data.text : "";
      const yearPrefix = extractYearPrefixFromOcrText(yearText);

      if (yearPrefix) {
        serial = yearPrefix + "/" + serial.replace(/^\/+/, "");
      }
    }

    // 3) Awaryjnie, jeśli mały wycinek nic nie znalazł, czytamy trochę większy środek etykiety.
    // Nadal jest to dużo szybciej niż OCR całego zdjęcia.
    if (!serial) {
      if (status) status.innerHTML = "⏳ Nie znalazłem S/N — sprawdzam większy fragment etykiety...";

      const labelCanvas = prepareOcrCanvas(image, "label");
      const labelResult = await Tesseract.recognize(labelCanvas, "eng", {
        tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789/.-: ",
        logger: info => {
          if (!status || !info || info.status !== "recognizing text") return;
          const pct = Math.round((info.progress || 0) * 100);
          status.innerHTML = "⏳ OCR sprawdza etykietę...<br>Postęp: " + pct + "%";
        }
      });

      const labelText = labelResult && labelResult.data ? labelResult.data.text : "";
      serial = extractSerialFromOcrText(labelText);

      if (serial && !/^\d{2}\//.test(serial)) {
        const yearPrefix = extractYearPrefixFromOcrText(labelText);
        if (yearPrefix) {
          serial = yearPrefix + "/" + serial.replace(/^\/+/, "");
        }
      }
    }

    if (!serial) {
      alert("Nie znalazłem numeru S/N. Zrób zdjęcie bliżej tak, żeby ramka S/N była na środku i była ostra.");
      return;
    }

    const added = addModuleCode(serial);

    if (added) {
      if ("vibrate" in navigator) navigator.vibrate(200);

      const beep = document.getElementById("beepSound");
      if (beep) beep.play().catch(() => {});
    }
  } catch (err) {
    alert("Błąd OCR: " + err.message);
  } finally {
    if (overlay) overlay.style.display = "none";
    input.value = "";
  }
}

function loadImageFromFile(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("Nie udało się wczytać zdjęcia."));
    img.src = URL.createObjectURL(file);
  });
}

function prepareOcrCanvas(image, mode) {
  const srcW = image.naturalWidth || image.width;
  const srcH = image.naturalHeight || image.height;

  // Kadry ustawione pod zdjęcie etykiety. Najważniejsze: pole S/N ma być mniej więcej na środku zdjęcia.
  let crop;

  if (mode === "sn") {
    // Środkowy pas etykiety, gdzie zwykle jest ramka S/N.
    crop = {
      x: Math.round(srcW * 0.08),
      y: Math.round(srcH * 0.34),
      w: Math.round(srcW * 0.68),
      h: Math.round(srcH * 0.22)
    };
  } else if (mode === "year") {
    // Prawy dolny fragment, gdzie zwykle jest YEAR OF PRODUCTION.
    crop = {
      x: Math.round(srcW * 0.46),
      y: Math.round(srcH * 0.43),
      w: Math.round(srcW * 0.48),
      h: Math.round(srcH * 0.30)
    };
  } else {
    // Większy środek etykiety jako awaryjny fallback.
    crop = {
      x: Math.round(srcW * 0.04),
      y: Math.round(srcH * 0.24),
      w: Math.round(srcW * 0.88),
      h: Math.round(srcH * 0.54)
    };
  }

  crop.x = Math.max(0, Math.min(crop.x, srcW - 1));
  crop.y = Math.max(0, Math.min(crop.y, srcH - 1));
  crop.w = Math.max(1, Math.min(crop.w, srcW - crop.x));
  crop.h = Math.max(1, Math.min(crop.h, srcH - crop.y));

  const scale = mode === "year" ? 2.2 : 2.8;
  const canvas = document.createElement("canvas");
  canvas.width = Math.round(crop.w * scale);
  canvas.height = Math.round(crop.h * scale);

  const ctx = canvas.getContext("2d", { willReadFrequently: true });
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(image, crop.x, crop.y, crop.w, crop.h, 0, 0, canvas.width, canvas.height);

  // Proste czyszczenie obrazu: szarość + kontrast + próg.
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imgData.data;

  for (let i = 0; i < data.length; i += 4) {
    const gray = (data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114);
    const contrast = (gray - 128) * 1.55 + 128;
    const bw = contrast > 155 ? 255 : 0;

    data[i] = bw;
    data[i + 1] = bw;
    data[i + 2] = bw;
  }

  ctx.putImageData(imgData, 0, 0);
  return canvas;
}

function extractYearPrefixFromOcrText(text) {
  const raw = String(text || "").toUpperCase();
  const compact = raw.replace(/[^0-9]/g, " ");

  const match = compact.match(/\b(20\d{2})\b/);
  if (!match) return "";

  return match[1].slice(-2);
}

function extractSerialFromOcrText(text) {
  const raw = String(text || "")
    .toUpperCase()
    .replace(/[\\|]/g, "/")
    .replace(/[–—]/g, "-")
    .replace(/O(?=\d)/g, "0")
    .replace(/(?<=\d)O/g, "0");

  const prefixes = [
    "LQBN", "RQBN", "LSUX", "CDHI", "CQBM",
    "CQM", "CQU", "LQU", "RQU", "LSX", "CDH",
    "LDI", "RDI", "RDH", "RSH", "LDU", "RDU",
    "CDJ", "DDJ", "CDT", "DDT", "CDD", "CDI",
    "LQ", "RQ", "LS", "LD", "RD"
  ];

  const prefixGroup = prefixes.join("|");
  const candidates = [];

  // Najpierw linie, bo po OCR często S/N i numer są w tej samej linii.
  const lines = raw
    .split(/\n+/)
    .map(line => line.replace(/\s+/g, "").replace(/\/+/, "/"));

  for (const line of lines) {
    if (!line) continue;

    // Numer z rokiem, np. 25/CDJ1234568 albo 22/5027350PL.
    candidates.push(...(line.match(/\d{2}\/[A-Z0-9]{5,18}/g) || []));

    // Numer z prefiksem bez roku, np. CDJ1234568, LSX35041877PL.
    const rePrefix = new RegExp("(?:" + prefixGroup + ")[A-Z0-9]{4,18}", "g");
    candidates.push(...(line.match(rePrefix) || []));

    // Numer cyfrowy bez roku, np. 5027350PL. Rok dołożymy później z YEAR OF PRODUCTION.
    candidates.push(...(line.match(/\b\d{6,8}[A-Z]{0,2}\b/g) || []));
  }

  // Awaryjnie tekst kompaktowy bez spacji.
  const compact = raw.replace(/\s+/g, "").replace(/\/+/, "/");
  candidates.push(...(compact.match(/\d{2}\/[A-Z0-9]{5,18}/g) || []));

  const cleaned = candidates
    .map(c => cleanSN(c))
    .map(c => c.replace(/[^A-Z0-9/]/g, ""))
    .map(c => c.replace(/\/+/, "/"))
    .filter(c => c.length >= 6)
    .filter(c => !/^20\d{2}$/.test(c))
    .filter(c => !/^12V$/i.test(c))
    .filter(c => !/^320KG$/i.test(c))
    .filter(c => !/^SL51AALC$/i.test(c));

  if (cleaned.length === 0) return "";

  // 1. Najlepszy przypadek: numer z XX/.
  const withYear = cleaned.find(c => /^\d{2}\/[A-Z0-9]{5,18}$/.test(c));
  if (withYear) return withYear;

  // 2. Numer z prefiksem maszynowym bez roku.
  const prefixOnly = cleaned.find(c => new RegExp("^(?:" + prefixGroup + ")[A-Z0-9]{4,18}$").test(c));
  if (prefixOnly) return prefixOnly;

  // 3. Numer cyfrowy bez roku.
  const numericOnly = cleaned.find(c => /^\d{6,8}[A-Z]{0,2}$/.test(c));
  if (numericOnly) return numericOnly;

  return cleaned[0] || "";
}

function stopModuleScanning() {
  if (html5QrModul && isModuleScanning) {
    html5QrModul.stop().then(() => {
      html5QrModul.clear();
      isModuleScanning = false;
      document.getElementById("readerModul").style.display = "none";
      document.getElementById("scanButtonsRow").style.display = "flex";
    }).catch(err => {
      console.error("Błąd zatrzymania skanera:", err);
      isModuleScanning = false;
      document.getElementById("readerModul").style.display = "none";
      document.getElementById("scanButtonsRow").style.display = "flex";
    });
  }
}
