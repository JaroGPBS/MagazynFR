<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Serwisy części – Le Magazynier</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <audio id="beepSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" preload="auto"></audio>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      background-color: #1c1c1c;
      font-family: sans-serif;
      color: #f5f5f5;
    }

    .form-wrapper {
      max-width: 500px;
      margin: auto;
      background: #333;
      padding: 20px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 90vh;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .logo {
      font-family: 'Informal Roman', cursive;
      font-size: 2.3rem;
      color: #f9f9f9;
    }

    .back-button {
      width: 25%;
      min-width: 80px;
      padding: 8px;
      font-size: 0.9rem;
      border: none;
      border-radius: 6px;
      background-color: #555;
      color: #fff;
      cursor: pointer;
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      font-size: 1rem;
      border: 1px solid #555;
      border-radius: 4px;
      background-color: #222;
      color: #f5f5f5;
    }

    input::placeholder { color: #999; }

    button {
      cursor: pointer;
      background-color: #666;
      border: none;
      font-weight: bold;
    }

    button:hover { background-color: #777; }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #reader {
      width: 100%;
      max-width: 400px;
      margin: 16px auto;
    }

    .search-results {
      margin: 8px 0 14px;
      border: 1px solid #555;
      border-radius: 8px;
      overflow: hidden;
      display: none;
    }

    .result-item {
      padding: 10px;
      background: #222;
      border-bottom: 1px solid #444;
      cursor: pointer;
    }

    .result-item:last-child {
      border-bottom: none;
    }

    .result-item:hover {
      background: #444;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #666;
    }

    .part-name {
      flex: 1;
      font-size: 0.95rem;
      word-break: break-word;
    }

    .part-qty {
      min-width: 55px;
      text-align: center;
      font-weight: bold;
      padding: 6px;
      border-radius: 6px;
      background: #1c1c1c;
      border: 1px solid #555;
    }

    .remove-btn {
      color: red;
      cursor: pointer;
      font-weight: bold;
      padding: 0 6px;
      font-size: 1.3rem;
    }

    .list-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid #666;
      border-radius: 999px;
      font-size: .85rem;
      background: #222;
      color: #f5f5f5;
    }

    .footer-logo {
      text-align: center;
      margin-top: 20px;
    }

    .footer-logo img {
      width: 40%;
      max-width: 200px;
      height: auto;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 18px;
    }

    .overlay-box {
      width: 100%;
      max-width: 360px;
      background: #333;
      padding: 22px;
      border-radius: 12px;
      border: 1px solid #666;
    }

    .modal-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .modal-part {
      font-size: 0.95rem;
      margin-bottom: 12px;
      color: #ddd;
    }

    .choice-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .choice-row button {
      flex: 1;
      height: 46px;
    }

    .receive-btn {
      background-color: #2e7d32;
    }

    .issue-btn {
      background-color: #aa3333;
    }

    .cancel-btn {
      background-color: #555;
      margin-top: 12px;
    }


    .base-status {
      width: 100%;
      min-height: 34px;
      margin: 18px 0 8px;
      padding: 8px 10px;
      border: 1px solid #555;
      border-radius: 8px;
      background-color: #2a2a2a;
      color: #cccccc;
      text-align: center;
      font-size: 0.9rem;
      font-weight: normal;
      user-select: none;
    }

    .base-status.error {
      color: #ffd600;
      font-weight: bold;
      border-color: #aa3333;
    }

    .status {
      font-size: 0.95rem;
      color: #ffdddd;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="form-wrapper">
    <div>
      <div class="header-row">
        <div class="logo">Serwisy części</div>
        <button class="back-button" onclick="goBack()">← Cofnij</button>
      </div>

      <input type="text" id="ekipaTrasa" placeholder="EKIPA / TRASA" autocomplete="off">

      <input type="text" id="searchInput" placeholder="Szukaj części po nazwie" autocomplete="off" disabled>
      <div id="searchResults" class="search-results"></div>

      <button id="startScanBtn" onclick="startScanning()" style="
        width: 100%;
        height: 50px;
        font-size: 1rem;
        font-weight: bold;
        background-color: #2e7d32;
        color: #fff;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        margin: 10px 0;" disabled>
        Skanuj QR części
      </button>

      <div id="reader" style="display: none;"></div>

      <div class="list-header">
        <h3 style="margin:0;">Lista części</h3>
        <span class="badge" id="codeCount">0</span>
      </div>

      <ul id="codeList"></ul>

      <button id="sendBtn" onclick="sendData()" disabled>Wyślij dane</button>

      <div id="partsBaseStatus" class="base-status" onclick="handleBaseStatusClick()">
        Baza części: brak
      </div>

      <p id="status" class="status"></p>
    </div>

    <div class="footer-logo">
      <img src="https://jarogpbs.github.io/MagazynFR/Jaro.png" alt="Created by Jaro">
    </div>
  </div>

  <!-- ŁADOWANIE BAZY -->
  <div id="loadingOverlay" class="overlay" style="display:none;">
    <div class="overlay-box">
      ⏳ Aktualizuję bazę części...<br>
      Proszę czekać.
    </div>
  </div>

  <!-- WYSYŁANIE -->
  <div id="sendingOverlay" class="overlay">
    <div class="overlay-box">
      ⏳ Wysyłanie danych...<br>
      Proszę czekać.
    </div>
  </div>

  <!-- WYBÓR PRZYJĘCIE / WYDANIE -->
  <div id="partModal" class="overlay">
    <div class="overlay-box">
      <div class="modal-title">Wybierz operację</div>
      <div id="modalPartName" class="modal-part"></div>

      <input type="number" id="modalQty" min="1" value="1" placeholder="ILOŚĆ">

      <div class="choice-row">
        <button class="receive-btn" onclick="confirmPart('receive')">Przyjmuję</button>
        <button class="issue-btn" onclick="confirmPart('issue')">Wydaję</button>
      </div>

      <button class="cancel-btn" onclick="closePartModal()">Anuluj</button>
    </div>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycby5xJAHto5XHSwXGWDoaUyjvZHB_rEBd6pqhUkk5JrvPw807HazHGvMKr00ZrG5rLGwIg/exec";

    let bazaCzesci = [];
    let listaCzesci = [];
    let selectedPart = null;
    let html5Qr;
    let isScanning = false;

    function goBack() {
      window.location.replace("index.html");
    }

    function normalizeText(text) {
      return String(text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function saveLista() {
      localStorage.setItem("serwisyCzesciLista", JSON.stringify(listaCzesci));
    }

    function updateList() {
      const list = document.getElementById("codeList");
      const count = document.getElementById("codeCount");

      list.innerHTML = "";
      count.textContent = String(listaCzesci.length);

      listaCzesci.forEach((item, index) => {
        const li = document.createElement("li");

        const name = document.createElement("div");
        name.className = "part-name";
        name.textContent = item.nazwa || "";

        const qty = document.createElement("div");
        qty.className = "part-qty";
        qty.textContent = item.ilosc > 0 ? String(item.ilosc) : String(item.ilosc);

        const remove = document.createElement("span");
        remove.className = "remove-btn";
        remove.textContent = "✕";
        remove.title = "Usuń";
        remove.onclick = () => {
          listaCzesci.splice(index, 1);
          saveLista();
          updateList();
        };

        li.appendChild(name);
        li.appendChild(qty);
        li.appendChild(remove);
        list.appendChild(li);
      });
    }

    function loadSavedList() {
      const saved = localStorage.getItem("serwisyCzesciLista");

      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          listaCzesci = Array.isArray(parsed) ? parsed : [];
        } catch {
          listaCzesci = [];
        }
      }

      updateList();
    }

    const PARTS_BASE_CACHE_KEY = "partsBaseCache_v1";
    const PARTS_BASE_TIME_KEY = "partsBaseCacheTime_v1";
    const PARTS_BASE_MAX_AGE = 7 * 24 * 60 * 60 * 1000;
    const BASE_DOUBLE_CLICK_MS = 600;

    let lastBaseStatusClick = 0;

    function enablePage() {
      document.getElementById("searchInput").disabled = false;
      document.getElementById("startScanBtn").disabled = false;
      document.getElementById("sendBtn").disabled = false;
      document.getElementById("loadingOverlay").style.display = "none";
    }

    function disablePartsControls() {
      document.getElementById("searchInput").disabled = true;
      document.getElementById("startScanBtn").disabled = true;
      document.getElementById("sendBtn").disabled = true;
      document.getElementById("loadingOverlay").style.display = "none";
    }

    function formatBaseDate(timestamp) {
      const d = new Date(timestamp);

      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const month = String(d.getMonth() + 1).padStart(2, "0");

      return `${hh}:${mm} ${day}.${month}`;
    }

    function setBaseStatus(text, isError) {
      const el = document.getElementById("partsBaseStatus");
      if (!el) return;

      el.textContent = text;

      if (isError) {
        el.classList.add("error");
      } else {
        el.classList.remove("error");
      }
    }

    function loadPartsBaseFromCache() {
      const savedBase = localStorage.getItem(PARTS_BASE_CACHE_KEY);
      const savedTime = Number(localStorage.getItem(PARTS_BASE_TIME_KEY) || 0);

      if (!savedBase || !savedTime) {
        setBaseStatus("Baza części: brak", false);
        return false;
      }

      try {
        const parsed = JSON.parse(savedBase);

        if (!Array.isArray(parsed) || parsed.length === 0) {
          setBaseStatus("Baza części: brak", false);
          return false;
        }

        bazaCzesci = parsed;
        enablePage();
        setBaseStatus("Baza z dnia: " + formatBaseDate(savedTime), false);

        return savedTime;
      } catch {
        disablePartsControls();
        setBaseStatus("BŁĄD AKTUALIZACJI", true);
        return false;
      }
    }

    function refreshPartsBaseInBackground() {
      fetch(scriptURL + "?akcja=bazaCzesci")
        .then(res => res.json())
        .then(data => {
          if (!data.ok || !Array.isArray(data.czesci) || data.czesci.length === 0) {
            if (bazaCzesci.length === 0) disablePartsControls();
            setBaseStatus("BŁĄD AKTUALIZACJI", true);
            return;
          }

          bazaCzesci = data.czesci;

          const now = Date.now();
          localStorage.setItem(PARTS_BASE_CACHE_KEY, JSON.stringify(bazaCzesci));
          localStorage.setItem(PARTS_BASE_TIME_KEY, String(now));

          enablePage();
          setBaseStatus("Baza z dnia: " + formatBaseDate(now), false);
        })
        .catch(err => {
          if (bazaCzesci.length === 0) disablePartsControls();
          setBaseStatus("BŁĄD AKTUALIZACJI", true);
        });
    }

    function forceRefreshPartsBase() {
      setBaseStatus("Aktualizuję bazę części...", false);
      refreshPartsBaseInBackground();
    }

    function handleBaseStatusClick() {
      const now = Date.now();

      if (now - lastBaseStatusClick <= BASE_DOUBLE_CLICK_MS) {
        lastBaseStatusClick = 0;
        forceRefreshPartsBase();
        return;
      }

      lastBaseStatusClick = now;
    }

    function loadPartsBase() {
      disablePartsControls();

      const savedTime = loadPartsBaseFromCache();

      if (!savedTime) {
        setBaseStatus("Aktualizuję bazę części...", false);
        refreshPartsBaseInBackground();
        return;
      }

      const age = Date.now() - savedTime;

      if (age > PARTS_BASE_MAX_AGE) {
        refreshPartsBaseInBackground();
      }
    }

    function searchParts() {
      const input = document.getElementById("searchInput");
      const resultsBox = document.getElementById("searchResults");
      const query = normalizeText(input.value);

      resultsBox.innerHTML = "";

      if (query.length < 2) {
        resultsBox.style.display = "none";
        return;
      }

      const results = bazaCzesci
        .filter(part => {
          const nazwa = normalizeText(part.nazwa);
          const indeks = normalizeText(part.indeks);
          return nazwa.includes(query) || indeks.includes(query);
        })
        .slice(0, 20);

      if (results.length === 0) {
        resultsBox.style.display = "block";
        const empty = document.createElement("div");
        empty.className = "result-item";
        empty.textContent = "Brak wyników";
        resultsBox.appendChild(empty);
        return;
      }

      results.forEach(part => {
        const div = document.createElement("div");
        div.className = "result-item";
        div.textContent = part.nazwa;
        div.onclick = () => {
          resultsBox.style.display = "none";
          input.value = "";
          openPartModal(part);
        };
        resultsBox.appendChild(div);
      });

      resultsBox.style.display = "block";
    }

    function findPartByIndex(indeks) {
      const val = String(indeks || "").trim().toUpperCase();
      return bazaCzesci.find(part => String(part.indeks || "").trim().toUpperCase() === val);
    }

    function openPartModal(part) {
      selectedPart = part;

      document.getElementById("modalPartName").textContent = part.nazwa;
      document.getElementById("modalQty").value = 1;
      document.getElementById("partModal").style.display = "flex";
    }

    function closePartModal() {
      selectedPart = null;
      document.getElementById("partModal").style.display = "none";
    }

    function confirmPart(type) {
      if (!selectedPart) return;

      const qtyRaw = document.getElementById("modalQty").value;
      const qty = Number(qtyRaw || 0);

      if (!qty || qty <= 0) {
        alert("Podaj ilość większą od zera.");
        return;
      }

      const signedQty = type === "issue" ? -Math.abs(qty) : Math.abs(qty);

      addPartToList({
        indeks: selectedPart.indeks,
        nazwa: selectedPart.nazwa,
        ilosc: signedQty
      });

      closePartModal();
    }

    function addPartToList(part) {
      const existing = listaCzesci.find(item =>
        String(item.indeks || "").trim().toUpperCase() === String(part.indeks || "").trim().toUpperCase()
      );

      if (existing) {
        existing.ilosc = Number(existing.ilosc || 0) + Number(part.ilosc || 0);

        if (existing.ilosc === 0) {
          listaCzesci = listaCzesci.filter(item =>
            String(item.indeks || "").trim().toUpperCase() !== String(part.indeks || "").trim().toUpperCase()
          );
        }
      } else {
        listaCzesci.unshift(part);
      }

      saveLista();
      updateList();
    }

    function sendData() {
      const ekipaTrasa = document.getElementById("ekipaTrasa").value.trim().toUpperCase();

      if (!ekipaTrasa) {
        alert("Uzupełnij pole EKIPA / TRASA.");
        return;
      }

      if (listaCzesci.length === 0) {
        alert("Lista części jest pusta.");
        return;
      }

      if (!confirm("Czy na pewno chcesz wysłać dane?")) return;

      document.getElementById("sendingOverlay").style.display = "flex";

      const formData = new FormData();
      formData.append("strona", "czesci");
      formData.append("ekipaTrasa", ekipaTrasa);
      formData.append("czesci", JSON.stringify(listaCzesci));

      fetch(scriptURL, { method: "POST", body: formData })
        .then(res => res.text())
        .then(txt => {
          alert("✅ Części wysłane.");
          listaCzesci = [];
          localStorage.removeItem("serwisyCzesciLista");
          updateList();
          window.location.replace("index.html");
        })
        .catch(err => {
          document.getElementById("sendingOverlay").style.display = "none";
          document.getElementById("status").innerText = "❌ Błąd: " + err;
        });
    }

    function startScanning() {
      if (isScanning) return;
      isScanning = true;

      document.getElementById("startScanBtn").style.display = "none";
      const readerDiv = document.getElementById("reader");
      readerDiv.style.display = "block";
      readerDiv.innerHTML = "";

      html5Qr = new Html5Qrcode("reader");

      Html5Qrcode.getCameras().then(cameras => {
        if (cameras && cameras.length) {
          const backCam = cameras.find(cam => (cam.label || "").toLowerCase().includes("back")) || cameras[0];

          html5Qr.start(backCam.id, { fps: 10, qrbox: 250 }, text => {
            stopScanning();

            const scanned = String(text || "").trim().toUpperCase();
            const part = findPartByIndex(scanned);

            if (!part) {
              alert("Nie znaleziono części dla zeskanowanego kodu.");
              return;
            }

            openPartModal(part);

            if ("vibrate" in navigator) navigator.vibrate(200);

            const beep = document.getElementById("beepSound");
            if (beep) beep.play().catch(() => {});
          });
        } else {
          alert("Nie wykryto kamery.");
          isScanning = false;
          document.getElementById("startScanBtn").style.display = "inline-block";
          document.getElementById("reader").style.display = "none";
        }
      }).catch(err => {
        alert("Błąd kamery: " + err);
        isScanning = false;
        document.getElementById("startScanBtn").style.display = "inline-block";
        document.getElementById("reader").style.display = "none";
      });
    }

    function stopScanning() {
      if (html5Qr && isScanning) {
        html5Qr.stop().then(() => {
          html5Qr.clear();
          isScanning = false;
          document.getElementById("reader").style.display = "none";
          document.getElementById("startScanBtn").style.display = "inline-block";
        }).catch(err => {
          console.error("Błąd zatrzymania skanera:", err);
          isScanning = false;
          document.getElementById("reader").style.display = "none";
          document.getElementById("startScanBtn").style.display = "inline-block";
        });
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadSavedList();
      loadPartsBase();

      document.getElementById("searchInput").addEventListener("input", searchParts);
    });
  </script>

  <script src="autoLogout.js"></script>

  <script>
    function reloadAtMidnight() {
      const now = new Date();
      const midnight = new Date();
      midnight.setHours(24, 0, 0, 0);

      const timeToMidnight = midnight - now;

      setTimeout(() => {
        window.location.reload(true);
      }, timeToMidnight);
    }

    reloadAtMidnight();
  </script>
  <script>
  history.pushState({ page: "app" }, "", window.location.href);

  window.addEventListener("popstate", function () {
    window.location.replace("index.html");
  });
</script>
</body>
</html>
